worker_processes auto;
pid /opt/tako-performance/run/nginx.pid;
error_log /opt/tako-performance/logs/nginx-error.log warn;

events {
    worker_connections 8192;
}

http {
    access_log off;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    upstream bench_app {
        server 127.0.0.1:9101;
        keepalive 256;
    }

    server {
        listen 18443 ssl;
        server_name bench.test;

        ssl_certificate /opt/tako-performance/certs/bench.test.crt;
        ssl_certificate_key /opt/tako-performance/certs/bench.test.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://bench_app;
        }
    }
}
