global
    maxconn 65535
    nbthread __THREADS__
    log /dev/null local0

defaults
    mode http
    log global
    option dontlognull
    option http-keep-alive
    http-reuse always
    timeout connect 5s
    timeout client 65s
    timeout server 65s
    timeout http-keep-alive 65s

frontend https_in
    bind 127.0.0.1:18443 ssl crt /opt/tako-performance/certs/bench.test.pem alpn http/1.1

    # Comparable high-water protection for the benchmark: nginx uses a per-IP
    # connection cap, while Tako tracks active requests. Keep this high enough
    # that normal timed rows measure proxy throughput instead of limiter cost.
    stick-table type ip size 100k expire 5m store conn_cur
    tcp-request connection track-sc0 src
    http-request deny deny_status 429 if { sc_conn_cur(0) gt 65535 }

    http-request set-header X-Forwarded-For %[src]
    http-request set-header X-Forwarded-Proto https
    default_backend bench_app

backend bench_app
    server app1 127.0.0.1:9101
